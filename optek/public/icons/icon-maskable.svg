<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
  </defs>
  <!-- Maskable: fondo completo sin bordes (safe zone = 80% central) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Monograma OR centrado en safe zone -->
  <text
    x="256"
    y="340"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="240"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-10"
  >OR</text>
  <!-- Punto dorado -->
  <circle cx="370" cy="165" r="20" fill="#F39C12"/>
</svg>
